<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecionando...</title>
    <script type="text/javascript">
        // Este código pega o "diadema" da URL e transforma em "?site=diadema"
        var path = window.location.pathname.split('/');
        var slug = path[path.length - 1] || path[path.length - 2];

        if (slug && slug !== 'index.html' && slug !== '') {
            window.location.replace(window.location.protocol + '//' + window.location.hostname + (window.location.port ? ':' + window.location.port : '') + '/?site=' + slug);
        } else {
            window.location.replace('/');
        }
    </script>
</head>
<body style="background:#0B0E14; color:#fff; display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif;">
    <p>Carregando loja...</p>
</body>
</html>
