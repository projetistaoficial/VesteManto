<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Veste Manto</title>
    <script type="text/javascript">
        // Este script pega o caminho da URL (ex: /diadema) 
        // e transforma em parâmetro (ex: /?site=diadema)
        var path = window.location.pathname.split('/');
        var slug = path[path.length - 1] || path[path.length - 2];

        if (slug && slug !== 'index.html') {
            // Redireciona para a raiz com o parâmetro que seu sistema já aceita
            window.location.replace(window.location.protocol + '//' + window.location.hostname + (window.location.port ? ':' + window.location.port : '')  + slug);
        } else {
            window.location.replace('/');
        }
    </script>
</head>
<body style="background:#0B0E14; color:#fff; display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif;">
    <p>Carregando loja...</p>
</body>
</html>
