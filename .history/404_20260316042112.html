<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script type="text/javascript">
        // 1. Pega o nome da loja (ex: diadema)
        var pathParts = window.location.pathname.split('/').filter(Boolean);
        var slug = pathParts[0];

        // 2. Se for "master", deixa entrar na pasta master (gestão)
        if (slug === 'master') {
            // Não faz nada, o GitHub abre a pasta master
        } 
        // 3. Se for qualquer outra coisa (LOJA), manda para a RAIZ com o parâmetro
        else if (slug) {
            // AQUI ESTAVA O ERRO: mudamos de '/master/?site=' para '/?site='
            var newUrl = window.location.protocol + '//' + window.location.hostname + '/?site=' + slug;
            window.location.replace(newUrl);
        }
    </script>
</head>
<body></body>
</html>
