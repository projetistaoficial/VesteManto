<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script type="text/javascript">
        var path = window.location.pathname.split('/').filter(Boolean);
        var slug = path[0];

        // Se o usuário quer acessar o painel, não redireciona
        if (slug === 'master') {
            // Deixa o GitHub Pages seguir o fluxo normal
        } 
        // Se for uma loja (ex: /diadema), joga o parâmetro para o index.html ler
        else if (slug) {
            var newUrl = window.location.protocol + '//' + window.location.hostname + '/?site=' + slug;
            window.location.replace(newUrl);
        } else {
            window.location.replace('/');
        }
    </script>
</head>
<body></body>
</html>
