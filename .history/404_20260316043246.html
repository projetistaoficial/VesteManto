<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script type="text/javascript">
        // Pega o que foi digitado (ex: /diadema)
        var pathParts = window.location.pathname.split('/').filter(Boolean);
        var slug = pathParts[0];

        // Se NÃO for a pasta master, manda para a loja com o parâmetro
        if (slug && slug !== 'master') {
            var newUrl = window.location.protocol + '//' + window.location.hostname + '/?site=' + slug;
            window.location.replace(newUrl);
        } else if (slug === 'master') {
            // Se for master, deixa o GitHub carregar a pasta master
        } else {
            window.location.replace('/');
        }
    </script>
</head>
<body></body>
</html>
