<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script type="text/javascript">
        var pathParts = window.location.pathname.split('/').filter(Boolean);
        var slug = pathParts[0];

        // Se for "master", deixa entrar na pasta master
        if (slug === 'master') {
            // Não faz nada, o GitHub vai carregar a pasta master normalmente
        } 
        // Se for qualquer outra coisa (ex: diadema), manda para a LOJA na raiz
        else if (slug) {
            var newUrl = window.location.protocol + '//' + window.location.hostname + '/?site=' + slug;
            window.location.replace(newUrl);
        }
    </script>
</head>
<body></body>
</html>
