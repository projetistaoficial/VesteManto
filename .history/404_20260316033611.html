<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script type="text/javascript">
        // Pega o caminho (ex: /diadema)
        var path = window.location.pathname;
        // Redireciona para a raiz passando o caminho como parâmetro
        // Isso transforma projetistaoficial.com/diadema em projetistaoficial.com/?site=diadema
        window.location.replace(window.location.protocol + '//' + window.location.hostname + '/?site=' + path.replace(/^\//, ''));
    </script>
</head>
<body>
</body>
</html>
