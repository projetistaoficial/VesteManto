<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Veste Manto</title>
    <script type="text/javascript">
        // Pega o caminho, remove as barras extras e limpa espaços
        var path = window.location.pathname.split('/').filter(Boolean);
        var slug = path.pop(); // Pega a última parte da URL (ex: "diadema")

        if (slug && slug !== 'index.html') {
            // Redireciona de forma limpa para a raiz com o parâmetro
            var newUrl = window.location.protocol + '//' + window.location.hostname + '/?site=' + slug;
            window.location.replace(newUrl);
        } else {
            window.location.replace('/');
        }
    </script>
</head>
<body style="background:#0B0E14; color:#fff; display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif;">
    <div style="text-align: center;">
        <h2 style="margin-bottom: 10px;">Buscando loja...</h2>
        <p style="color: #666; font-size: 14px;">Aguarde um instante.</p>
    </div>
</body>
</html>a
