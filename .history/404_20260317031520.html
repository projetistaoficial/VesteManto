<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <script>
        var path = window.location.pathname.split('/').filter(Boolean);
        var slug = path[0];
        if (slug && slug !== 'master' && slug !== 'index.html') {
            window.location.replace('/?site=' + slug);
        } else if (!slug) {
            window.location.replace('/master/'); // Se acessar puro, vai pro painel
        }
    </script>
</head>

<body></body>

</html>
